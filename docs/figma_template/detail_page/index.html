<!DOCTYPE html>
<html lang="ko">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <link rel="stylesheet" href="globals.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="element">
        <h1 class="name">#1상품명</h1>
        <!-- Product image placeholders -->
        <div class="img" role="img" aria-label="상품 이미지 1"></div>
        <div class="div" role="img" aria-label="상품 이미지 2"></div>
        <div class="img-2" role="img" aria-label="상품 이미지 3"></div>
        <!-- Product detail section -->
        <section aria-labelledby="product-detail-title">
            <h2 class="text-wrapper" id="product-detail-title">제품 상세정보</h2>
            <div class="rectangle" aria-hidden="true"></div>
            <dl class="group">
                <div class="line" aria-hidden="true"></div>
                <div class="line-2" aria-hidden="true"></div>
                <div class="line-3" aria-hidden="true"></div>
                <div class="line-4" aria-hidden="true"></div>
                <dt class="text-wrapper-2">상품명</dt>
                <dd class="name-2">#상품명 (자동 생성)</dd>
                <dt class="text-wrapper-3">색상</dt>
                <dd class="color">#색상 (자동 생성)</dd>
                <dt class="text-wrapper-4">수량</dt>
                <dd class="count">#수량 (자동 생성)</dd>
                <dt class="text-wrapper-5">재질</dt>
                <dd class="mtl">#소재 (자동 생성)</dd>
                <dt class="text-wrapper-6">제조국</dt>
                <dd class="text-wrapper-7">중국</dd>
            </dl>
        </section>
    </main>
</body>

</html>
