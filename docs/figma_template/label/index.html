<!DOCTYPE html>
<html lang="ko">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <link rel="stylesheet" href="globals.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Main product label card -->
    <article class="element">
        <!-- Auto-generated dynamic values overlay -->
        <section class="view" aria-label="자동 생성 항목">
            <span class="name">#상품명 (자동 생성)</span>
            <span class="color">#색상 (자동 생성)</span>
            <span class="mtl">#소재 (자동 생성)</span>
            <span class="count">#수량 (자동 생성)</span>
        </section>
        <!-- Product required display information table -->
        <section class="div" aria-label="제품 필수 표시사항">
            <!-- Section heading -->
            <h1 class="text-wrapper-14">제품 필수 표시사항</h1>
            <!-- Label: 상품명 -->
            <span class="text-wrapper-3">상품명</span>
            <!-- Label: 색상 -->
            <span class="text-wrapper-4">색상</span>
            <!-- Label: 재질 -->
            <span class="text-wrapper-5">재질</span>
            <!-- Label: 수량 -->
            <span class="text-wrapper-8">수량</span>
            <!-- Label: 제조국 -->
            <span class="text-wrapper-7">제조국</span>
            <!-- Value: 중국 (Made in China) -->
            <span class="text-wrapper-6">중국 (Made in China)</span>
            <!-- Label: 소비자 상담실 -->
            <span class="text-wrapper-9">소비자 상담실</span>
            <!-- Value: 1577-7011 -->
            <span class="text-wrapper">1577-7011</span>
            <!-- Label: 제조자 -->
            <span class="text-wrapper-10">제조자</span>
            <!-- Value: 헤오르 협력사 -->
            <span class="text-wrapper-2">헤오르 협력사</span>
            <!-- Label: 수입자 -->
            <span class="text-wrapper-12">수입자</span>
            <!-- Value: 헤오르 -->
            <span class="text-wrapper-11">헤오르</span>
            <!-- Label: 반품 및 교환 -->
            <span class="text-wrapper-13">반품 및 교환</span>
            <!-- Value: 반품 및 교환 안내 -->
            <p class="p">판매처를 통해서 진행 부탁 드립니다.</p>
        </section>
    </article>
</body>

</html>
